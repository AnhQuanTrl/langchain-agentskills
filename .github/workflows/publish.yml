name: Publish to PyPI
on:
  release:
    types: [published]
jobs:
  pypi-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # Still required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5 # Official uv setup action

      - name: Build package
        run: uv build

      - name: Publish package
        run: uv publish # uv automatically finds artifacts in dist/
